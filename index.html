<!doctype html>
<html lang="en" data-theme="fieldmouse" data-mode="light">
<head>
  <meta charset="UTF-8"/>
  <script>
    (function(){
      var t=localStorage.getItem("twomice_theme")||"fieldmouse";
      var m=localStorage.getItem("twomice_mode")||"light";
      var el=document.documentElement;
      var single=["stark-light","stark-dark","goldenrod"];
      var isSingle=single.indexOf(t)!==-1;
      el.setAttribute("data-theme",t);
      if(isSingle){el.removeAttribute("data-mode")}
      else{el.setAttribute("data-mode",m)}
      var C={fieldmouse:{light:{b:"#faf5ee",s:"#ffffff",x:"#1a0e04"},mid:{b:"#e8d8c4",s:"#f0e4d0",x:"#1a0e04"},dark:{b:"#1a1008",s:"#221408",x:"#f0e4d0"}},midnight:{light:{b:"#f0eeff",s:"#ffffff",x:"#0d0820"},mid:{b:"#1e1840",s:"#251e4c",x:"#e4dcff"},dark:{b:"#0d0b18",s:"#120f20",x:"#e8e0ff"}},"urban-rat":{light:{b:"#f5f5f5",s:"#ffffff",x:"#1a1a1a"},mid:{b:"#2a2a2a",s:"#333333",x:"#e8e8e8"},dark:{b:"#0d0d0d",s:"#141414",x:"#f0f0f0"}},pinewood:{light:{b:"#f0f5f0",s:"#ffffff",x:"#0e1a10"},mid:{b:"#2c3e2e",s:"#364a38",x:"#d4eed4"},dark:{b:"#1a2218",s:"#1e2a1e",x:"#e0f0e0"}},"stark-light":{b:"#ffffff",s:"#ffffff",x:"#000000"},"stark-dark":{b:"#000000",s:"#000000",x:"#ffffff"},goldenrod:{b:"#1a1200",s:"#221800",x:"#ffd700"}};
      var c=isSingle?C[t]:C[t][m];
      var s=document.createElement("style");
      s.textContent=(isSingle?'[data-theme="'+t+'"]':'[data-theme="'+t+'"][data-mode="'+m+'"]')+"{--bg-primary:"+c.b+";--bg-surface:"+c.s+";--text-primary:"+c.x+"}body{background:"+c.b+"}";
      document.head.appendChild(s);
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TwoMice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
